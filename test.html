<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>iframe Font</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.container {
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

#musicFrame {
    border: none;
    width: 83.3333%;
    height: 83.3333%;
    transform: scale(1.2);
    transform-origin: left top;
}
</style>

</head>
<body>

<div class="container">
    <iframe
        id="musicFrame"
        src="https://music.gdstudio.org/">
    </iframe>
</div>

<script>
const iframe = document.getElementById("musicFrame");

iframe.onload = function () {
    try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;

        // 等待页面完全渲染
        setTimeout(() => {

            // 注入全局CSS
            const style = doc.createElement("style");
            style.innerHTML = `
                *{
                    font-size:18px !important;
                    line-height:1.5 !important;
                }

                body{
                    font-size:18px !important;
                }

                input,button,textarea,select{
                    font-size:18px !important;
                }
            `;

            doc.head.appendChild(style);

            console.log("字体修改成功");

        }, 1000);

    } catch (e) {
        console.error("无法访问iframe：", e);
    }
};
</script>

</body>
</html>
